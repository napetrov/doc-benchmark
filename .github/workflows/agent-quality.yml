name: agent-quality

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:
    inputs:
      strict:
        description: 'Enable strict mode (exit 1 on gate/band fail)'
        required: false
        type: boolean
        default: false

defaults:
  run:
    working-directory: agent-benchmark

jobs:
  terminal-bench-verify:
    name: Verify terminal-bench-tasks (oracle solutions)
    runs-on: ubuntu-latest
    env:
      TERMINAL_BENCH_TASKS: >-
        onetbb-parallel-sort onetbb-nstream onetbb-stencil onetbb-transpose
        onetbb-parallel-reduce onetbb-parallel-scan onetbb-flow-graph
        intel-perf-serial-accumulator intel-perf-false-sharing
        intel-perf-shared-counter intel-perf-missing-restrict
        intel-perf-hotspot-report intel-perf-ttas-spinlock
        intel-perf-mutex-rwlock intel-perf-cv-herd intel-perf-crc32c
        intel-perf-simd-sort
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker images
        run: |
          set -euo pipefail
          for task in $TERMINAL_BENCH_TASKS
          do
            docker build \
              -t "intel-hpc-bench/${task}:latest" \
              "terminal-bench-tasks/${task}/environment/"
          done

      - name: Run oracle solutions + verifiers inside containers
        run: |
          set -euo pipefail
          for task in $TERMINAL_BENCH_TASKS
          do
            mkdir -p "/tmp/logs/${task}"
            chmod 777 "/tmp/logs/${task}"
            docker run --rm \
              --network none \
              --cpus=4 \
              --memory=2g \
              -v "${{ github.workspace }}/agent-benchmark/terminal-bench-tasks/${task}/solution:/solution:ro" \
              -v "${{ github.workspace }}/agent-benchmark/terminal-bench-tasks/${task}/tests:/tests:ro" \
              -v "/tmp/logs/${task}:/logs" \
              "intel-hpc-bench/${task}:latest" \
              bash -c "bash /solution/solve.sh && bash /tests/test.sh"

            REWARD=$(cat "/tmp/logs/${task}/verifier/reward.txt" | tr -d '[:space:]')
            echo "${task} reward: $REWARD"
            if [ "$REWARD" != "1" ]; then
              echo "❌ ${task} oracle solution did not pass all tests (reward=$REWARD)"
              exit 1
            fi
            echo "✅ ${task} oracle solution passed all tests"
          done

      - name: Upload verifier logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: terminal-bench-logs
          path: /tmp/logs/

  # Tasks that depend on the Intel oneAPI apt repo (oneMKL, IPP),
  # header-only oneDPL, or large pip installs (sklearnex). Each task is a
  # separate matrix leg (one check run per task, fail-fast disabled) so a
  # failure or heavy build in one cannot affect the core oneTBB job above and
  # the per-task pass/fail is visible at a glance.
  terminal-bench-verify-oneapi:
    name: Verify oneAPI task
    runs-on: ubuntu-latest
    # Verify-only job: it just checks out the repo and builds/runs containers,
    # so restrict the token to read access.
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        task:
          - sklearnex-classification
          - onemkl-dgemm
          - onemkl-fft
          - onedpl-transform-reduce
          - ipp-dotprod
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android \
            /opt/hostedtoolcache/CodeQL /usr/local/share/boost || true
          docker system prune -af || true
          df -h /

      - name: Build, run, and verify ${{ matrix.task }} (offline verification)
        run: |
          set -euo pipefail
          task="${{ matrix.task }}"
          echo "::group::build ${task}"
          docker build \
            -t "intel-hpc-bench/${task}:latest" \
            "terminal-bench-tasks/${task}/environment/"
          echo "::endgroup::"

          mkdir -p "/tmp/logs/${task}"
          docker run --rm \
            --network none \
            --shm-size=2g \
            --cpus=4 \
            --memory=4g \
            -v "${{ github.workspace }}/agent-benchmark/terminal-bench-tasks/${task}/solution:/solution:ro" \
            -v "${{ github.workspace }}/agent-benchmark/terminal-bench-tasks/${task}/tests:/tests:ro" \
            -v "/tmp/logs/${task}:/logs" \
            "intel-hpc-bench/${task}:latest" \
            bash -c "bash /solution/solve.sh && bash /tests/test.sh"

          REWARD=$(cat "/tmp/logs/${task}/verifier/reward.txt" | tr -d '[:space:]')
          echo "${task} reward: $REWARD"
          if [ "$REWARD" != "1" ]; then
            echo "❌ ${task} oracle solution did not pass all tests (reward=$REWARD)"
            exit 1
          fi
          echo "✅ ${task} oracle solution passed all tests"

      - name: Upload verifier logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: terminal-bench-oneapi-logs-${{ matrix.task }}
          path: /tmp/logs/

  benchmark:
    runs-on: ubuntu-latest
    continue-on-error: ${{ github.event.inputs.strict != 'true' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Run benchmark
        run: |
          python cli.py run --root . --spec benchmarks/spec.v1.yaml \
            --out-json baselines/current.json --out-md reports/current.md \
            ${{ github.event.inputs.strict == 'true' && '--strict' || '' }}
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: agent-quality-report
          path: |
            agent-benchmark/baselines/current.json
            agent-benchmark/reports/current.md
