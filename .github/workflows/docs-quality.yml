name: docs-quality

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:
    inputs:
      strict:
        description: 'Enable strict mode (exit 1 on gate/band fail)'
        required: false
        type: boolean
        default: false

jobs:
  terminal-bench-verify:
    name: Verify terminal-bench-tasks (oracle solutions)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker images
        run: |
          set -euo pipefail
          for task in \
            onetbb-parallel-sort \
            onetbb-nstream \
            onetbb-stencil \
            onetbb-transpose \
            onetbb-parallel-reduce \
            onetbb-parallel-scan \
            onetbb-flow-graph
          do
            docker build \
              -t "intel-hpc-bench/${task}:latest" \
              "terminal-bench-tasks/${task}/environment/"
          done

      - name: Run oracle solutions + verifiers inside containers
        run: |
          set -euo pipefail
          for task in \
            onetbb-parallel-sort \
            onetbb-nstream \
            onetbb-stencil \
            onetbb-transpose \
            onetbb-parallel-reduce \
            onetbb-parallel-scan \
            onetbb-flow-graph
          do
            mkdir -p "/tmp/logs/${task}"
            docker run --rm \
              --network none \
              --cpus=4 \
              --memory=2g \
              -v "${{ github.workspace }}/terminal-bench-tasks/${task}/solution:/solution:ro" \
              -v "${{ github.workspace }}/terminal-bench-tasks/${task}/tests:/tests:ro" \
              -v "/tmp/logs/${task}:/logs" \
              "intel-hpc-bench/${task}:latest" \
              bash -c "bash /solution/solve.sh && bash /tests/test.sh"

            REWARD=$(cat "/tmp/logs/${task}/verifier/reward.txt" | tr -d '[:space:]')
            echo "${task} reward: $REWARD"
            if [ "$REWARD" != "1" ]; then
              echo "❌ ${task} oracle solution did not pass all tests (reward=$REWARD)"
              exit 1
            fi
            echo "✅ ${task} oracle solution passed all tests"
          done

      - name: Upload verifier logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: terminal-bench-logs
          path: /tmp/logs/

  # Separate job for tasks that depend on the Intel oneAPI apt repo (oneMKL,
  # IPP, oneCCL) or large pip installs (sklearnex). Isolated from the oneTBB
  # job above so a heavy-image build or transport quirk here cannot turn the
  # core verification red. Images are built, verified, and removed one at a
  # time to stay within the runner's disk budget.
  terminal-bench-verify-oneapi:
    name: Verify terminal-bench-tasks (oneAPI components, oracle solutions)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android \
            /opt/hostedtoolcache/CodeQL /usr/local/share/boost || true
          docker system prune -af || true
          df -h /

      - name: Build, run, and verify each task (offline verification)
        run: |
          set -euo pipefail
          for task in \
            sklearnex-classification \
            onemkl-dgemm \
            onemkl-fft \
            onedpl-transform-reduce \
            ipp-dotprod \
            oneccl-allreduce
          do
            echo "::group::build ${task}"
            docker build \
              -t "intel-hpc-bench/${task}:latest" \
              "terminal-bench-tasks/${task}/environment/"
            echo "::endgroup::"

            mkdir -p "/tmp/logs/${task}"
            docker run --rm \
              --network none \
              --shm-size=2g \
              --cpus=4 \
              --memory=4g \
              -v "${{ github.workspace }}/terminal-bench-tasks/${task}/solution:/solution:ro" \
              -v "${{ github.workspace }}/terminal-bench-tasks/${task}/tests:/tests:ro" \
              -v "/tmp/logs/${task}:/logs" \
              "intel-hpc-bench/${task}:latest" \
              bash -c "bash /solution/solve.sh && bash /tests/test.sh"

            REWARD=$(cat "/tmp/logs/${task}/verifier/reward.txt" | tr -d '[:space:]')
            echo "${task} reward: $REWARD"
            if [ "$REWARD" != "1" ]; then
              echo "❌ ${task} oracle solution did not pass all tests (reward=$REWARD)"
              exit 1
            fi
            echo "✅ ${task} oracle solution passed all tests"

            # Reclaim disk before the next heavy image.
            docker rmi "intel-hpc-bench/${task}:latest" || true
            docker builder prune -af || true
            df -h /
          done

      - name: Upload verifier logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: terminal-bench-oneapi-logs
          path: /tmp/logs/

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: pip install -r requirements-test.txt
      - name: Run tests
        run: pytest --cov=doc_benchmarks --cov-report=term --cov-report=xml
      - name: Upload coverage
        uses: codecov/codecov-action@v3
        if: always()
        with:
          files: ./coverage.xml
          flags: unittests

  benchmark:
    runs-on: ubuntu-latest
    continue-on-error: ${{ github.event.inputs.strict != 'true' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Run benchmark
        run: |
          python cli.py run --root . --spec benchmarks/spec.v1.yaml \
            --out-json baselines/current.json --out-md reports/current.md \
            ${{ github.event.inputs.strict == 'true' && '--strict' || '' }}
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: docs-quality-report
          path: |
            baselines/current.json
            reports/current.md
