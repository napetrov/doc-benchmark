name: docs-quality

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:
    inputs:
      strict:
        description: 'Enable strict mode (exit 1 on gate/band fail)'
        required: false
        type: boolean
        default: false

jobs:
  terminal-bench-verify:
    name: Verify terminal-bench-tasks (oracle solutions)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image — onetbb-parallel-sort
        run: |
          docker build \
            -t intel-hpc-bench/onetbb:latest \
            terminal-bench-tasks/onetbb-parallel-sort/environment/

      - name: Run oracle solution inside container
        run: |
          docker run --rm \
            --cpus=2 \
            --memory=2g \
            -v "${{ github.workspace }}/terminal-bench-tasks/onetbb-parallel-sort/solution:/solution:ro" \
            -v "${{ github.workspace }}/terminal-bench-tasks/onetbb-parallel-sort/tests:/tests:ro" \
            -v /tmp/logs:/logs \
            intel-hpc-bench/onetbb:latest \
            bash /solution/solve.sh

      - name: Run verifier (pytest tests)
        run: |
          docker run --rm \
            --cpus=2 \
            --memory=2g \
            -v "${{ github.workspace }}/terminal-bench-tasks/onetbb-parallel-sort/tests:/tests:ro" \
            -v /tmp/logs:/logs \
            intel-hpc-bench/onetbb:latest \
            bash /tests/test.sh

      - name: Check reward == 1
        run: |
          REWARD=$(cat /tmp/logs/verifier/reward.txt | tr -d '[:space:]')
          echo "Reward: $REWARD"
          if [ "$REWARD" != "1" ]; then
            echo "❌ Oracle solution did not pass all tests (reward=$REWARD)"
            exit 1
          fi
          echo "✅ Oracle solution passed all tests"

      - name: Upload verifier logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: terminal-bench-logs
          path: /tmp/logs/

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: pip install -r requirements-test.txt
      - name: Run tests
        run: pytest --cov=doc_benchmarks --cov-report=term --cov-report=xml
      - name: Upload coverage
        uses: codecov/codecov-action@v3
        if: always()
        with:
          files: ./coverage.xml
          flags: unittests

  benchmark:
    runs-on: ubuntu-latest
    continue-on-error: ${{ github.event.inputs.strict != 'true' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Run benchmark
        run: |
          python cli.py run --root . --spec benchmarks/spec.v1.yaml \
            --out-json baselines/current.json --out-md reports/current.md \
            ${{ github.event.inputs.strict == 'true' && '--strict' || '' }}
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: docs-quality-report
          path: |
            baselines/current.json
            reports/current.md
